# 数据核实日期（ISO）。价格/规则会随 Anthropic 调整而过时——报告页脚据此提示时效，
# 更新本文件价格时务必同步更新此字段。
as_of: "2026-06-16"

# 6/15 Agent SDK 计费变更状态：announced 已宣布 | paused 已暂停 | active 已生效。
# 截至 2026-06-16 官方已暂停（support.claude.com，"目前一切照旧"）；报告据此提示。恢复后改为 active。
change_status: paused

# 计划月度 credit 额度（USD，按 API 标准价计费）。来源：Anthropic 2026-06-15 计费变更公告。
plans:
  pro:    {credit_usd: 20}
  max5x:  {credit_usd: 100}
  max20x: {credit_usd: 200}

# 模型单价（USD / 百万 token）。核实自 claude-api 参考（2026-06）。
models:
  claude-opus-4-8:   {input_per_mtok: 5.0, output_per_mtok: 25.0}
  claude-sonnet-4-6: {input_per_mtok: 3.0, output_per_mtok: 15.0}
  claude-haiku-4-5:  {input_per_mtok: 1.0, output_per_mtok: 5.0}

# 单次调用 token 用量档位（估算值，可按真实情况调整）。
token_tiers:
  small:  {input: 15000,  output: 2000}
  medium: {input: 60000,  output: 8000}
  large:  {input: 200000, output: 20000}

default_model: claude-opus-4-8
default_tier: medium
